<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: white; font-size: 9px; }

.controls { display: flex; gap: 12px; margin-bottom: 1rem; align-items: center; padding: 8px; }
.btn { padding: 6px 16px; border: 1px solid #ccc; border-radius: 4px; background: transparent; cursor: pointer; font-size: 13px; }
.btn:hover { background: #f5f5f5; }
.info { font-size: 12px; color: #666; flex: 1; }

/* =============================================
   LARGEURS DES COLONNES
   ============================================= */
.col-type      { width: 7.5%; }   /* Type */
.col-nom       { width: 12.5%; }  /* Nom + Variété */
.col-epingle   { width: 2.5%; }   /* N° épingle */
.col-nbep      { width: 2.5%; }   /* Nb épingles */
.col-origine   { width: 5%; }     /* Origine (par sachet) */
.col-sachet    { width: 2.5%; }   /* Sachet */
.col-annee     { width: 5%; }     /* Millésime */
.col-saisons   { width: 2.5%; }   /* Nb saisons */
.col-qtte      { width: 5%; }     /* Quantité graines */
.col-germ      { width: 5%; }     /* Germination % */
.col-profond   { width: 5%; }     /* Profondeur / Nb.gr (vide à remplir) */
.col-germdur   { width: 5%; }     /* Durée germ / Nb.go (vide à remplir) */
.col-germtemp  { width: 5%; }     /* T° germ / Année.s (vide à remplir) */
.col-sa        { width: 10%; }    /* Semis sous abri / Date.s (vide) */
.col-se        { width: 5%; }     /* Semis ext / Germé (vide) */
.col-vide1     { width: 5%; }     /* Oups (vide à remplir) */
.col-arrosage  { width: 5%; }     /* Arrosage / Planté (vide) */
.col-exposition{ width: 10%; }    /* Exposition / Date.p (vide) */
.col-ou        { width: 10%; }    /* Où cultiver */
.col-vide2     { width: 5%; }     /* Donné (vide à remplir) */

.page {
  width: 297mm;
  margin: 0 auto 20px auto;
  background: white;
  padding: 15mm 10mm 10mm 10mm;
  border: 0.5px solid #ddd;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

thead th {
  background: #e0e0e0;
  color: #111;
  font-size: 8px;
  font-weight: 600;
  text-align: center;
  padding: 2px 1px;
  border: 1px solid #999;
  line-height: 1.1;
  vertical-align: middle;
}

td {
  border: 1px solid #aaa;
  text-align: center;
  vertical-align: middle;
  padding: 1px 2px;
  font-size: 9px;
  color: #111;
  overflow: hidden;
  line-height: 1.2;
}
th, td {
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

/* Info en bas de cellule — données stables depuis Varietes */
td.info-bas {
  vertical-align: bottom;
  font-size: 7px;
  color: #888;
  padding-bottom: 2px;
}

/* Cellule Nom */
td.nom-cell {
  text-align: center;
  vertical-align: middle;
}
td.nom-cell .nom {
  font-weight: 700;
  font-size: 9px;
  display: block;
}
td.nom-cell .variete {
  font-size: 8px;
  font-weight: 400;
  display: block;
}

/* Cellules multi-sachets */
td.multi {
  vertical-align: top;
  padding: 0;
}
td.multi .sachet-line {
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid #ddd;
  padding: 0px 2px;
  min-height: 4mm;
}
td.multi .sachet-line:last-child {
  border-bottom: none;
}

tr.graine-row td {
  height: 8mm;
}

@media print {
  .controls { display: none; }
  @page { size: A4 landscape; margin: 0; }
  .page {
    width: 100%;
    padding: 15mm 10mm 10mm 10mm;
    margin: 0;
    border: none;
  }
  .page-last-of-group {
    page-break-after: always;
    break-after: page;
  }
  .page:last-child {
    page-break-after: avoid !important;
    break-after: avoid !important;
  }
  tr { page-break-inside: avoid; break-inside: avoid; }
}
</style>
</head>
<body>

<div class="controls">
  <span class="info" id="info-count">Chargement...</span>
  <button class="btn" onclick="window.print()">🖨️ Imprimer</button>
</div>

<div id="pages"></div>

<script>

alert("TEST WIDGET");
   
console.log("SCRIPT DEMARRE");

const GRAINES_PAR_PAGE = 20;


/* ===============================
   STOCKAGE
================================ */

let varietesById = {};
let derniersRecords = null;


/* ===============================
   FORMATAGE
================================ */

const MOIS_ABBREV = {
  "Jan": "J", "Fév": "F", "Mar": "M", "Avr": "A",
  "Mai": "Ma", "Jui": "Ju", "Juil": "Jl", "Aou": "Ao",
  "Sep": "S", "Oct": "O", "Nov": "N", "Déc": "D",
  "Janvier": "J", "Février": "F", "Mars": "M",
  "Avril": "A", "Juin": "Ju", "Juillet": "Jl",
  "Août": "Ao", "Septembre": "S",
  "Octobre": "O", "Novembre": "N",
  "Décembre": "D"
};


function formatVal(v){
  if (!v) return '';
  if (Array.isArray(v)) return v.join(', ');
  return String(v);
}


function formatAnnee(v){
  if (!v) return '';
  return String(v).substring(0,4);
}


function abrevMois(v){
  if (!v) return '';
  return String(v)
    .split(',')
    .map(x => MOIS_ABBREV[x.trim()] || x.trim())
    .join(' ');
}


/* ===============================
   TABLEAU
================================ */

function makeHeader(){

return `
<thead>
<tr>
<th>Type</th>
<th>Nom</th>
<th>Ép.</th>
<th>Nb</th>
<th>Orig.</th>
<th>Sac.</th>
<th>Année</th>
<th>Sais.</th>
<th>Qté</th>
<th>Germ.</th>
<th>Nb.gr</th>
<th>Nb.go</th>
<th>Année.s</th>
<th>Date.s</th>
<th>Germé</th>
<th>Oups</th>
<th>Planté</th>
<th>Date.p</th>
<th>Où</th>
<th>Donné</th>
</tr>
</thead>
`;
}



function makeRow(graine){

let sachets = graine.sachets;

return `
<tr>

<td>${graine.type}</td>

<td>
<b>${graine.nom}</b><br>
${graine.variete || ''}
</td>

<td>${graine.num_epingle}</td>
<td>${graine.nb_epingle}</td>

<td>${sachets.map(x=>x.origine).join('<br>')}</td>

<td>${sachets.map(x=>x.sachet).join('<br>')}</td>

<td>${sachets.map(x=>formatAnnee(x.annee)).join('<br>')}</td>

<td>${sachets.map(x=>x.saisons).join('<br>')}</td>

<td>${sachets.map(x=>x.qtte).join('<br>')}</td>

<td>${sachets.map(x=>x.germination).join('<br>')}</td>


<td>${graine.profondeur}</td>
<td>${graine.germ_duree}</td>
<td>${graine.germ_temp}</td>

<td>${abrevMois(graine.semis_abri)}</td>

<td>${abrevMois(graine.semis_ext)}</td>

<td></td>

<td>${graine.arrosage}</td>

<td>${graine.exposition}</td>

<td>${formatVal(graine.ou)}</td>

<td></td>

</tr>
`;

}


/* ===============================
   CONSTRUCTION DONNEES
================================ */

function buildGrainesMap(records){

console.log("Construction map avec",records.length,"lignes");


const map = new Map();


records.forEach(r=>{


if(!r.Sachets) return;


const v = varietesById[r.NomVariete] || {};


const key = r.NomVariete || r.id;


if(!map.has(key)){


map.set(key,{

type:v.Type || '',

nom:v.Nom || '',

variete:v.Variete || '',

num_epingle:v.Num_epingle || '',

nb_epingle:v.Nb_epingle || '',

profondeur:v.Semis_profondeur || '',

germ_duree:v.Duree_germ || '',

germ_temp:v.Temp_germ || '',

semis_abri:v.Semis_sous_abris || '',

semis_ext:v.Semis_pleine_terre || '',

arrosage:v.Arrosage || '',

exposition:v.Exposition || '',

ou:v.Ou_cultiver || '',

sachets:[]

});

}



map.get(key).sachets.push({

origine:r.Origine || '',

sachet:r.Sachets || '',

annee:r.Millesime || '',

saisons:r.Nb_saisons || '',

qtte:r.Qtte_graines || '',

germination:
r.Germination_affichee != null
? Math.round(r.Germination_affichee*100)+'%'
: ''

});


});


return map;

}



/* ===============================
   AFFICHAGE
================================ */

function render(graines){

console.log("RENDER",graines.length);


document.getElementById('info-count').textContent =
graines.length+" variétés";


document.getElementById('pages').innerHTML = `

<div class="page">

<table>

${makeHeader()}

<tbody>

${graines.map(makeRow).join('')}

</tbody>

</table>

</div>

`;

}



/* ===============================
   GRIST
================================ */


console.log(" DEMARRE");


grist.ready({
requiredAccess:'full'
});



/*
 CHARGE VARIETES
*/

console.log("AVANT FETCH");


grist.docApi.fetchTable('Varietes')

.then(data=>{


console.log("FETCH OK");
console.log("Colonnes reçues :",Object.keys(data));


const ids = data.id ?? data.Id ?? [];


console.log("Nombre IDs :",ids.length);



ids.forEach((id,i)=>{


varietesById[id]={


Type:data.Type?.[i] || '',

Nom:data.Nom?.[i] || '',

Variete:data.Variete?.[i] || '',

Num_epingle:data.Num_epingle?.[i] || '',

Nb_epingle:data.Nb_epingle?.[i] || '',

Semis_profondeur:data.Semis_profondeur?.[i] || '',

Duree_germ:data.Duree_germ?.[i] || '',

Temp_germ:data.Temp_germ?.[i] || '',

Semis_sous_abris:data.Semis_sous_abris?.[i] || '',

Semis_pleine_terre:data.Semis_pleine_terre?.[i] || '',

Arrosage:data.Arrosage?.[i] || '',

Exposition:data.Exposition?.[i] || '',

Ou_cultiver:data.Ou_cultiver?.[i] || ''

};


});



console.log(
"Varietes chargées :",
Object.keys(varietesById).length
);



if(derniersRecords){

render(
[...buildGrainesMap(derniersRecords).values()]
);

}


})

.catch(err=>{

console.error(
"ERREUR FETCH VARIETES",
err
);

});




/*
 RECEPTION MILLESIMES
*/

grist.onRecords(records=>{


console.log(
"MILLESIMES RECUS",
records.length
);


console.log(
"PREMIERE LIGNE",
records[0]
);


derniersRecords = records;



if(Object.keys(varietesById).length){


render(
[...buildGrainesMap(records).values()]
);


}


});


</script>

</body>
</html>
