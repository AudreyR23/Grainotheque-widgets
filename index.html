<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: white; font-size: 9px; }

.controls { display: flex; gap: 12px; margin-bottom: 1rem; align-items: center; padding: 8px; }
.btn { padding: 6px 16px; border: 1px solid #ccc; border-radius: 4px; background: transparent; cursor: pointer; font-size: 13px; }
.btn:hover { background: #f5f5f5; }
.info { font-size: 12px; color: #666; flex: 1; }

/* =============================================
   LARGEURS DES COLONNES
   ============================================= */
.col-type      { width: 7.5%; }   /* Type */
.col-nom       { width: 12.5%; }  /* Nom + Variété */
.col-epingle   { width: 2.5%; }   /* N° épingle */
.col-nbep      { width: 2.5%; }   /* Nb épingles */
.col-origine   { width: 5%; }     /* Origine (par sachet) */
.col-sachet    { width: 2.5%; }   /* Sachet */
.col-annee     { width: 5%; }     /* Millésime */
.col-saisons   { width: 2.5%; }   /* Nb saisons */
.col-qtte      { width: 5%; }     /* Quantité graines */
.col-germ      { width: 5%; }     /* Germination % */
.col-profond   { width: 5%; }     /* Profondeur / Nb.gr (vide à remplir) */
.col-germdur   { width: 5%; }     /* Durée germ / Nb.go (vide à remplir) */
.col-germtemp  { width: 5%; }     /* T° germ / Année.s (vide à remplir) */
.col-sa        { width: 10%; }    /* Semis sous abri / Date.s (vide) */
.col-se        { width: 5%; }     /* Semis ext / Germé (vide) */
.col-vide1     { width: 5%; }     /* Oups (vide à remplir) */
.col-arrosage  { width: 5%; }     /* Arrosage / Planté (vide) */
.col-exposition{ width: 10%; }    /* Exposition / Date.p (vide) */
.col-ou        { width: 10%; }    /* Où cultiver */
.col-vide2     { width: 5%; }     /* Donné (vide à remplir) */

.page {
  width: 297mm;
  margin: 0 auto 20px auto;
  background: white;
  padding: 15mm 10mm 10mm 10mm;
  border: 0.5px solid #ddd;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

thead th {
  background: #e0e0e0;
  color: #111;
  font-size: 8px;
  font-weight: 600;
  text-align: center;
  padding: 2px 1px;
  border: 1px solid #999;
  line-height: 1.1;
  vertical-align: middle;
}

td {
  border: 1px solid #aaa;
  text-align: center;
  vertical-align: middle;
  padding: 1px 2px;
  font-size: 9px;
  color: #111;
  overflow: hidden;
  line-height: 1.2;
}
th, td {
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

/* Info en bas de cellule — données stables depuis Varietes */
td.info-bas {
  vertical-align: bottom;
  font-size: 7px;
  color: #888;
  padding-bottom: 2px;
}

/* Cellule Nom */
td.nom-cell {
  text-align: center;
  vertical-align: middle;
}
td.nom-cell .nom {
  font-weight: 700;
  font-size: 9px;
  display: block;
}
td.nom-cell .variete {
  font-size: 8px;
  font-weight: 400;
  display: block;
}

/* Cellules multi-sachets */
td.multi {
  vertical-align: top;
  padding: 0;
}
td.multi .sachet-line {
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid #ddd;
  padding: 0px 2px;
  min-height: 4mm;
}
td.multi .sachet-line:last-child {
  border-bottom: none;
}

tr.graine-row td {
  height: 8mm;
}

@media print {
  .controls { display: none; }
  @page { size: A4 landscape; margin: 0; }
  .page {
    width: 100%;
    padding: 15mm 10mm 10mm 10mm;
    margin: 0;
    border: none;
  }
  .page-last-of-group {
    page-break-after: always;
    break-after: page;
  }
  .page:last-child {
    page-break-after: avoid !important;
    break-after: avoid !important;
  }
  tr { page-break-inside: avoid; break-inside: avoid; }
}
</style>
</head>
<body>

<div class="controls">
  <span class="info" id="info-count">Chargement...</span>
  <button class="btn" onclick="window.print()">🖨️ Imprimer</button>
</div>

<div id="pages"></div>

<script>
const GRAINES_PAR_PAGE = 20;

/* =============================================
   Abréviations mois
   ============================================= */
const MOIS_ABBREV = {
  "Jan": "J", "Fév": "F", "Mar": "M", "Avr": "A",
  "Mai": "Ma", "Jui": "Ju", "Juil": "Jl", "Aou": "Ao",
  "Sep": "S", "Oct": "O", "Nov": "N", "Déc": "D",
  "Janvier": "J", "Février": "F", "Mars": "M", "Avril": "A",
  "Juin": "Ju", "Juillet": "Jl", "Août": "Ao",
  "Septembre": "S", "Octobre": "O", "Novembre": "N", "Décembre": "D"
};

function formatAnnee(valeur) {
  if (!valeur) return '';
  return String(valeur).substring(0, 4);
}

function abrevMois(valeur) {
  if (!valeur) return '';
  if (Array.isArray(valeur)) {
    return valeur.map(m => MOIS_ABBREV[m] || m).join(' ');
  }
  return String(valeur).split(',').map(m => MOIS_ABBREV[m.trim()] || m.trim()).join(' ');
}

function formatVal(valeur) {
  if (!valeur) return '';
  if (Array.isArray(valeur)) return valeur.join(', ');
  return String(valeur);
}

/* =============================================
   EN-TÊTE DU TABLEAU
   ============================================= */
function makeHeader() {
  return `<thead><tr>
    <th class="col-type">Type</th>
    <th class="col-nom">Nom-Variété</th>
    <th class="col-epingle">Ép.</th>
    <th class="col-nbep">Nb</th>
    <th class="col-origine">Orig.</th>
    <th class="col-sachet">Sac.</th>
    <th class="col-annee">Millésime</th>
    <th class="col-saisons">Sais.</th>
    <th class="col-qtte">Qté</th>
    <th class="col-germ">Germ.</th>
    <th class="col-profond">Nb.gr</th>
    <th class="col-germdur">Nb.go</th>
    <th class="col-germtemp">Année.s</th>
    <th class="col-sa">Date.s</th>
    <th class="col-se">Germé</th>
    <th class="col-vide1">Oups</th>
    <th class="col-arrosage">Planté</th>
    <th class="col-exposition">Date.p</th>
    <th class="col-ou">Où</th>
    <th class="col-vide2">Donné</th>
  </tr></thead>`;
}

/* =============================================
   CONSTRUCTION D'UNE LIGNE
   graine = objet avec sachets[] et infos Varietes
   ============================================= */
function makeRow(graine) {
  const sachets = graine.sachets;
  const nb = sachets.length;

  function multiCell(cls, values) {
    if (nb <= 1) {
      return `<td class="${cls}">${values[0] || ''}</td>`;
    }
    const lines = values.map(v =>
      `<span class="sachet-line">${v || ''}</span>`
    ).join('');
    return `<td class="${cls} multi">${lines}</td>`;
  }

  return `<tr class="graine-row">
    <td class="col-type">${graine.type || ''}</td>
    <td class="col-nom nom-cell">
      <span class="nom">${graine.nom || ''}</span>
      ${graine.variete ? `<span class="variete">${graine.variete}</span>` : ''}
    </td>
    <td class="col-epingle">${graine.num_epingle || ''}</td>
    <td class="col-nbep">${graine.nb_epingle || ''}</td>

    <!-- Colonnes par sachet (depuis Millesimes) -->
    ${multiCell('col-origine', sachets.map(s => formatVal(s.origine)))}
    ${multiCell('col-sachet', sachets.map(s => s.sachet))}
    ${multiCell('col-annee', sachets.map(s => formatAnnee(s.annee)))}
    ${multiCell('col-saisons', sachets.map(s => s.saisons))}
    ${multiCell('col-qtte', sachets.map(s => s.qtte))}
    ${multiCell('col-germ', sachets.map(s => s.germination))}

    <!-- Colonnes info-bas (depuis Varietes via fetchTable) + colonnes vides à remplir à la main -->
    <td class="col-profond info-bas">${graine.profondeur || ''}</td>
    <td class="col-germdur info-bas">${graine.germ_duree || ''}</td>
    <td class="col-germtemp info-bas">${graine.germ_temp || ''}</td>
    <td class="col-sa info-bas">${abrevMois(graine.semis_abri)}</td>
    <td class="col-se info-bas">${abrevMois(graine.semis_ext)}</td>
    <td class="col-vide1"></td>
    <td class="col-arrosage info-bas">${graine.arrosage || ''}</td>
    <td class="col-exposition info-bas">${graine.exposition || ''}</td>
    <td class="col-ou info-bas">${formatVal(graine.ou)}</td>
    <td class="col-vide2"></td>
  </tr>`;
}

/* =============================================
   RENDU DES PAGES
   Groupement par Type, tri Nom + Variété
   ============================================= */
function render(graines) {
  document.getElementById('info-count').textContent = graines.length + ' variétés';
  const pagesEl = document.getElementById('pages');
  pagesEl.innerHTML = '';

  graines.sort((a, b) => {
    const typeComp = (a.type || '').localeCompare(b.type || '', 'fr');
    if (typeComp !== 0) return typeComp;
    const nomComp = (a.nom || '').localeCompare(b.nom || '', 'fr');
    if (nomComp !== 0) return nomComp;
    return (a.variete || '').localeCompare(b.variete || '', 'fr');
  });

  const parType = [];
  let typeActuel = null;
  let groupe = [];
  graines.forEach(g => {
    if (g.type !== typeActuel) {
      if (groupe.length > 0) parType.push(groupe);
      typeActuel = g.type;
      groupe = [g];
    } else {
      groupe.push(g);
    }
  });
  if (groupe.length > 0) parType.push(groupe);

  parType.forEach(groupeType => {
    const nbPages = Math.ceil(groupeType.length / GRAINES_PAR_PAGE);
    for (let p = 0; p < nbPages; p++) {
      const pageGraines = groupeType.slice(p * GRAINES_PAR_PAGE, (p + 1) * GRAINES_PAR_PAGE);
      const page = document.createElement('div');
      const isLastOfGroup = (p === nbPages - 1);
      page.className = isLastOfGroup ? 'page page-last-of-group' : 'page';
      page.innerHTML = `<table>
        ${makeHeader()}
        <tbody>${pageGraines.map(makeRow).join('')}</tbody>
      </table>`;
      pagesEl.appendChild(page);
    }
  });
}

/* =============================================
   STOCKAGE DE VARIETES (chargé via fetchTable)
   Clé = id Grist de la ligne Varietes
   ============================================= */
let varietesById = {};
let derniersRecords = null;

/* =============================================
   CONSTRUCTION DE LA MAP DES GRAINES
   Reçoit les enregistrements de Millesimes
   Croise avec varietesById via r.NomVariete (id)
   Groupement par variété — agrège les sachets
   ============================================= */
function buildGrainesMap(records) {
  const map = new Map();

  records
    .filter(r => r.Sachets)
    .forEach(r => {
      // r.NomVariete = id numérique de la ligne Varietes
      const v = varietesById[r.NomVariete] || {};
      const key = r.NomVariete || ('_' + r.id);

      if (!map.has(key)) {
        map.set(key, {
          // Depuis Varietes (fetchTable)
          type:        v.Type || '',
          nom:         v.Nom || '',
          variete:     v.Variete || '',
          num_epingle: v.Num_epingle || '',
          nb_epingle:  v.Nb_epingle || '',
          profondeur:  v.Semis_profondeur || '',
          germ_duree:  v.Duree_germ || '',
          germ_temp:   v.Temp_germ || '',
          semis_abri:  v.Semis_sous_abris || '',
          semis_ext:   v.Semis_pleine_terre || '',
          arrosage:    v.Arrosage || '',
          exposition:  v.Exposition || '',
          ou:          v.Ou_cultiver || '',
          sachets: []
        });
      }

      // Depuis Millesimes (onRecords)
      map.get(key).sachets.push({
        origine:     r.Origine || '',
        sachet:      r.Sachets || '',
        annee:       r.Millesime || '',
        saisons:     r.Nb_saisons || '',
        qtte:        r.Qtte_graines || '',
        germination: r.Germination_affichee != null
          ? Math.round(r.Germination_affichee * 100) + '%'
          : '',
      });
    });

  return map;
}

/* =============================================
   INITIALISATION GRIST
   Étape 1 : fetchTable('Varietes') — infos stables
   Étape 2 : onRecords — reçoit Millesimes
   Le rendu n'a lieu que quand les deux sont prêts
   ============================================= */
grist.ready({ requiredAccess: 'full' });

grist.onRecords(function(records) {
  derniersRecords = records;
  console.log('onRecords reçu:', records.length, '| varietesById:', Object.keys(varietesById).length);
  if (Object.keys(varietesById).length > 0) {
    const map = buildGrainesMap(records);
    render(Array.from(map.values()));
  }
});

// fetchTable APRÈS onRecords
grist.docApi.fetchTable('Varietes').then(data => {
  varietesById = {};
  const ids = data.id || [];
  ids.forEach((id, i) => {
    varietesById[id] = {
      Type:               data.Type        ? data.Type[i]        : '',
      Nom:                data.Nom         ? data.Nom[i]         : '',
      Variete:            data.Variete     ? data.Variete[i]     : '',
      Num_epingle:        data.Num_epingle ? data.Num_epingle[i] : '',
      Nb_epingle:         data.Nb_epingle  ? data.Nb_epingle[i]  : '',
      Semis_profondeur:   data.Semis_profondeur  ? data.Semis_profondeur[i]  : '',
      Duree_germ:         data.Duree_germ        ? data.Duree_germ[i]        : '',
      Temp_germ:          data.Temp_germ         ? data.Temp_germ[i]         : '',
      Semis_sous_abris:   data.Semis_sous_abris  ? data.Semis_sous_abris[i]  : '',
      Semis_pleine_terre: data.Semis_pleine_terre ? data.Semis_pleine_terre[i] : '',
      Arrosage:           data.Arrosage    ? data.Arrosage[i]    : '',
      Exposition:         data.Exposition  ? data.Exposition[i]  : '',
      Ou_cultiver:        data.Ou_cultiver ? data.Ou_cultiver[i] : '',
    };
  });
  console.log('Varietes chargées :', Object.keys(varietesById).length);
  if (derniersRecords) {
    const map = buildGrainesMap(derniersRecords);
    render(Array.from(map.values()));
  }
}).catch(e => console.error('Erreur:', e));

// Étape 2 : réception de Millesimes
grist.onRecords(function(records) {
  derniersRecords = records;
  if (Object.keys(varietesById).length > 0) {
    const map = buildGrainesMap(records);
    render(Array.from(map.values()));
  }
});
 console.log('onRecords reçu, varietesById size:', Object.keys(varietesById).length);
</script>
</body>
</html>
