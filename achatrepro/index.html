<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
/* =============================================
   DESIGN — tons terre, vert jardin, typographie nette
   ============================================= */
:root {
  --vert:       #2d6a4f;
  --vert-clair: #52b788;
  --vert-bg:    #d8f3dc;
  --terre:      #8b5e3c;
  --fond:       #f7f4ef;
  --blanc:      #ffffff;
  --gris:       #e8e4dc;
  --gris-texte: #6b6560;
  --rouge:      #c0392b;
  --texte:      #2c2a27;
  --radius:     8px;
  --shadow:     0 2px 8px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: var(--fond);
  color: var(--texte);
  font-size: 13px;
  min-height: 100vh;
}

/* Navigation */
.nav {
  display: flex;
  gap: 4px;
  padding: 10px 12px 0;
  border-bottom: 2px solid var(--vert);
  background: var(--blanc);
}
.nav-btn {
  padding: 7px 14px;
  border: none;
  border-radius: var(--radius) var(--radius) 0 0;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  background: var(--gris);
  color: var(--gris-texte);
  transition: all 0.15s;
}
.nav-btn.active {
  background: var(--vert);
  color: white;
}
.nav-btn:hover:not(.active) {
  background: var(--vert-bg);
  color: var(--vert);
}

/* Panneaux */
.panel { display: none; padding: 14px 12px; }
.panel.active { display: block; }

/* Titre panneau */
.panel-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--vert);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--gris);
}

/* Formulaire */
.form-group { margin-bottom: 10px; }
.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--gris-texte);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 3px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 6px 8px;
  border: 1px solid var(--gris);
  border-radius: var(--radius);
  font-size: 13px;
  background: var(--blanc);
  color: var(--texte);
  transition: border-color 0.15s;
}
.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--vert-clair);
}

/* Grille 2 colonnes */
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

/* Choix multiples (mois) */
.choice-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.choice-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border: 1px solid var(--gris);
  border-radius: 20px;
  cursor: pointer;
  font-size: 11px;
  background: var(--blanc);
  user-select: none;
  transition: all 0.12s;
}
.choice-pill input[type=checkbox] { display: none; }
.choice-pill.checked {
  background: var(--vert-bg);
  border-color: var(--vert-clair);
  color: var(--vert);
  font-weight: 600;
}

/* Boutons */
.btn-row { display: flex; gap: 8px; margin-top: 14px; }
.btn {
  padding: 8px 18px;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.15s;
}
.btn-primary { background: var(--vert); color: white; }
.btn-primary:hover { background: #1f4f38; }
.btn-primary:disabled { background: var(--gris); color: var(--gris-texte); cursor: not-allowed; }
.btn-secondary { background: var(--gris); color: var(--texte); }
.btn-secondary:hover { background: #d5d0c8; }

/* Séparateur */
.sep {
  border: none;
  border-top: 1px dashed var(--gris);
  margin: 12px 0;
}

/* Messages */
.msg {
  padding: 8px 10px;
  border-radius: var(--radius);
  font-size: 12px;
  margin-top: 10px;
  display: none;
}
.msg.ok  { background: var(--vert-bg); color: var(--vert); display: block; }
.msg.err { background: #fce4e4; color: var(--rouge); display: block; }

/* Chargement */
.loading {
  color: var(--gris-texte);
  font-style: italic;
  font-size: 12px;
  padding: 20px 0;
  text-align: center;
}

/* Tag info */
.badge {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  background: var(--vert-bg);
  color: var(--vert);
  font-weight: 600;
  margin-left: 4px;
}
</style>
</head>
<body>

<!-- Navigation -->
<div class="nav">
  <button class="nav-btn active" onclick="showPanel('variete')">🌱 Nouvelle variété</button>
  <button class="nav-btn" onclick="showPanel('millesime')">📦 Nouveau millésime</button>
  <button class="nav-btn" onclick="showPanel('modele')">🗂 Nouvelle espèce</button>
</div>

<!-- =============================================
     PANNEAU 1 : NOUVELLE VARIÉTÉ
     ============================================= -->
<div class="panel active" id="panel-variete">
  <div class="panel-title">🌱 Nouvelle variété</div>

  <div class="form-group">
    <label>Modèle de base <span class="badge">pré-remplit le formulaire</span></label>
    <select id="v-modele" onchange="chargerModele()">
      <option value="">— Choisir un modèle —</option>
    </select>
  </div>

  <hr class="sep">

  <div class="form-row">
    <div class="form-group">
      <label>Nom (ex: Tomate)</label>
      <input type="text" id="v-nom" placeholder="Tomate">
    </div>
    <div class="form-group">
      <label>Variété (ex: Orange Bouroin)</label>
      <input type="text" id="v-variete" placeholder="Orange Bouroin">
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Type</label>
      <select id="v-type"></select>
    </div>
    <div class="form-group">
      <label>Famille</label>
      <select id="v-famille" multiple style="height:60px"></select>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Conservation (ans)</label>
      <input type="number" id="v-conservation" min="1" max="20">
    </div>
    <div class="form-group">
      <label>Profondeur de semis</label>
      <select id="v-profondeur"></select>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Durée germination (jours)</label>
      <input type="number" id="v-duree-germ" min="1" max="60">
    </div>
    <div class="form-group">
      <label>Température germination</label>
      <input type="text" id="v-temp-germ" placeholder="ex: 20-25°">
    </div>
  </div>

  <div class="form-group">
    <label>Semis sous abri 🏠</label>
    <div class="choice-grid" id="v-abri"></div>
  </div>

  <div class="form-group">
    <label>Semis pleine terre 🌿</label>
    <div class="choice-grid" id="v-terre"></div>
  </div>

  <div class="form-group">
    <label>Récolte / Floraison</label>
    <div class="choice-grid" id="v-recolte"></div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Exposition</label>
      <select id="v-exposition"></select>
    </div>
    <div class="form-group">
      <label>Arrosage</label>
      <select id="v-arrosage"></select>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Nature du sol</label>
      <select id="v-nature-sol" multiple style="height:60px"></select>
    </div>
    <div class="form-group">
      <label>Qualité du sol</label>
      <select id="v-qualite-sol" multiple style="height:60px"></select>
    </div>
  </div>

  <div class="form-group">
    <label>Où cultiver</label>
    <select id="v-ou-cultiver" multiple style="height:60px"></select>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="btn-creer-variete" onclick="creerVariete()">✅ Créer la variété</button>
    <button class="btn btn-secondary" onclick="resetVariete()">↩ Réinitialiser</button>
  </div>
  <div class="msg" id="msg-variete"></div>
</div>

<!-- =============================================
     PANNEAU 2 : NOUVEAU MILLÉSIME
     ============================================= -->
<div class="panel" id="panel-millesime">
  <div class="panel-title">📦 Nouveau millésime</div>

  <div class="form-group">
    <label>Variété</label>
    <select id="m-variete">
      <option value="">— Choisir une variété —</option>
    </select>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Millésime (année)</label>
      <input type="number" id="m-millesime" min="1900" max="2100" value="2026">
    </div>
    <div class="form-group">
      <label>Nb saisons</label>
      <select id="m-nb-saisons">
        <option value="or.">or. (original)</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Origine</label>
      <select id="m-origine" multiple style="height:60px"></select>
    </div>
    <div class="form-group">
      <label>Sachet</label>
      <select id="m-sachet"></select>
    </div>
  </div>

  <div class="form-group">
    <label>Quantité de graines</label>
    <input type="number" id="m-qtte" min="0" placeholder="ex: 50">
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="creerMillesime()">✅ Créer le millésime</button>
    <button class="btn btn-secondary" onclick="resetMillesime()">↩ Réinitialiser</button>
  </div>
  <div class="msg" id="msg-millesime"></div>
</div>

<!-- =============================================
     PANNEAU 3 : NOUVELLE ESPÈCE (modèle)
     ============================================= -->
<div class="panel" id="panel-modele">
  <div class="panel-title">🗂 Nouvelle espèce (modèle)</div>

  <div class="form-group">
    <label>Partir d'un modèle existant <span class="badge">optionnel</span></label>
    <select id="e-modele-base" onchange="chargerModeleBase()">
      <option value="">— Créer from scratch —</option>
    </select>
  </div>

  <hr class="sep">

  <div class="form-group">
    <label>Nom de l'espèce (ex: Tomate)</label>
    <input type="text" id="e-nom" placeholder="Tomate">
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Type</label>
      <select id="e-type"></select>
    </div>
    <div class="form-group">
      <label>Famille</label>
      <select id="e-famille" multiple style="height:60px"></select>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Conservation (ans)</label>
      <input type="number" id="e-conservation" min="1" max="20">
    </div>
    <div class="form-group">
      <label>Profondeur de semis</label>
      <select id="e-profondeur"></select>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Durée germination (jours)</label>
      <input type="number" id="e-duree-germ" min="1" max="60">
    </div>
    <div class="form-group">
      <label>Température germination</label>
      <input type="text" id="e-temp-germ" placeholder="ex: 20-25°">
    </div>
  </div>

  <div class="form-group">
    <label>Semis sous abri 🏠</label>
    <div class="choice-grid" id="e-abri"></div>
  </div>

  <div class="form-group">
    <label>Semis pleine terre 🌿</label>
    <div class="choice-grid" id="e-terre"></div>
  </div>

  <div class="form-group">
    <label>Récolte / Floraison</label>
    <div class="choice-grid" id="e-recolte"></div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Exposition</label>
      <select id="e-exposition"></select>
    </div>
    <div class="form-group">
      <label>Arrosage</label>
      <select id="e-arrosage"></select>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Nature du sol</label>
      <select id="e-nature-sol" multiple style="height:60px"></select>
    </div>
    <div class="form-group">
      <label>Qualité du sol</label>
      <select id="e-qualite-sol" multiple style="height:60px"></select>
    </div>
  </div>

  <div class="form-group">
    <label>Où cultiver</label>
    <select id="e-ou-cultiver" multiple style="height:60px"></select>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="creerModele()">✅ Créer l'espèce</button>
    <button class="btn btn-secondary" onclick="resetModele()">↩ Réinitialiser</button>
  </div>
  <div class="msg" id="msg-modele"></div>
</div>

<script>
/* =============================================
   DONNÉES GRIST CHARGÉES AU DÉMARRAGE
   ============================================= */
let modeles   = [];   // lignes de la table Modele
let varietes  = [];   // lignes de la table Varietes (pour la liste du panneau 2)
let metaChoix = {};   // choix disponibles par colonne (depuis Grist metadata)

/* Valeurs des mois — identiques dans toutes les ChoiceList de mois */
const MOIS = ['Jan','Fév','Mar','Avr','Mai','Jui','Juil','Aou','Sep','Oct','Nov','Déc'];

/* =============================================
   NAVIGATION
   ============================================= */
function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  event.target.classList.add('active');
}

/* =============================================
   UTILITAIRES — PILLS (cases à cocher style étiquette)
   ============================================= */
function buildPills(containerId, values, selected = []) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  values.forEach(v => {
    const pill = document.createElement('label');
    pill.className = 'choice-pill' + (selected.includes(v) ? ' checked' : '');
    pill.innerHTML = `<input type="checkbox" value="${v}" ${selected.includes(v) ? 'checked' : ''}> ${v}`;
    pill.querySelector('input').addEventListener('change', e => {
      pill.classList.toggle('checked', e.target.checked);
    });
    container.appendChild(pill);
  });
}

function getPills(containerId) {
  const vals = [...document.querySelectorAll(`#${containerId} input:checked`)]
    .map(i => i.value);

  return vals.length ? ["L", ...vals] : ["L"];
}

function setPills(containerId, selected) {
  document.querySelectorAll(`#${containerId} .choice-pill`).forEach(pill => {
    const cb = pill.querySelector('input');
    const checked = selected.includes(cb.value);
    cb.checked = checked;
    pill.classList.toggle('checked', checked);
  });
}

/* =============================================
   UTILITAIRES — SELECTS
   ============================================= */
function fillSelect(id, options, selected = null) {
  const el = document.getElementById(id);
  const prev = el.value;
  el.innerHTML = '<option value="">—</option>';
  options.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o; opt.textContent = o;
    if (o === (selected || prev)) opt.selected = true;
    el.appendChild(opt);
  });
}

function fillMultiSelect(id, options, selected = []) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  options.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o; opt.textContent = o;
    opt.selected = selected.includes(o);
    el.appendChild(opt);
  });
}

function getMultiSelect(id) {
  const el = document.getElementById(id);

  if (!el) return ["L"];

  const vals = [...el.selectedOptions]
    .map(o => o.value)
    .filter(v => v);

  return ["L", ...vals];
}

/* =============================================
   AFFICHER UN MESSAGE
   ============================================= */
function showMsg(id, txt, type) {
  const el = document.getElementById(id);
  el.textContent = txt;
  el.className = 'msg ' + type;
  setTimeout(() => { el.className = 'msg'; }, 4000);
}

/* =============================================
   INITIALISATION — charge les données Grist
   ============================================= */
grist.ready({ requiredAccess: 'full' });

async function init() {
  try {
    /* Charger les modèles */
    const dataModele = await grist.docApi.fetchTable('Modele');
    modeles = dataModele.id.map((id, i) => ({
      id,
      Nom:               dataModele.Nom?.[i]               || '',
      Type:              dataModele.Type?.[i]              || '',
      Conservation:      dataModele.Conservation?.[i]      || '',
      Semis_profondeur:  dataModele.Semis_profondeur?.[i]  || '',
      Duree_germ:        dataModele.Duree_germ?.[i]        || '',
      Temp_germ:         dataModele.Temp_germ?.[i]         || '',
      Semis_sous_abris:  dataModele.Semis_sous_abris?.[i]  || [],
      Semis_pleine_terre:dataModele.Semis_pleine_terre?.[i]|| [],
      Recolte_floraison: dataModele.Recolte_floraison?.[i] || [],
      Exposition:        dataModele.Exposition?.[i]        || '',
      Arrosage:          dataModele.Arrosage?.[i]          || '',
      Nature_du_sol:     dataModele.Nature_du_sol?.[i]     || [],
      Qualite_du_sol:    dataModele.Qualite_du_sol?.[i]    || [],
      Famille:           dataModele.Famille?.[i]           || [],
      Ou_cultiver:       dataModele.Ou_cultiver?.[i]       || [],
      Infos:             dataModele.Infos?.[i]             || [],
    }));

    /* Charger les variétés pour le panneau millésime */
    const dataVar = await grist.docApi.fetchTable('Varietes');
    varietes = dataVar.id.map((id, i) => ({
      id,
      NomVariete: dataVar.NomVariete?.[i] || '',
      Nom:        dataVar.Nom?.[i]        || '',
      Variete:    dataVar.Variete?.[i]    || '',
    })).sort((a, b) => (a.Nom + a.Variete).localeCompare(b.Nom + b.Variete, 'fr'));

    /* Charger les métadonnées des colonnes (pour récupérer les choix) */
    const meta = await grist.docApi.fetchTable('_grist_Tables_column');
    const tablesMeta = await grist.docApi.fetchTable('_grist_Tables');

    /* Trouver l'id de la table Varietes */
    const varTableId = tablesMeta.id[tablesMeta.tableId.indexOf('Varietes')];

    /* Extraire les choix pour chaque colonne */
    meta.id.forEach((id, i) => {
      if (meta.parentId[i] !== varTableId) return;
      const col = meta.colId[i];
      const widgetOpts = meta.widgetOptions[i];
      if (!widgetOpts) return;
      try {
        const opts = JSON.parse(widgetOpts);
        if (opts.choices) metaChoix[col] = opts.choices;
      } catch(e) {}
    });

    /* Remplir les listes de modèles */
    const selV = document.getElementById('v-modele');
    const selE = document.getElementById('e-modele-base');
    modeles.forEach(m => {
      [selV, selE].forEach(sel => {
        const opt = document.createElement('option');
        opt.value = m.id; opt.textContent = m.Nom;
        sel.appendChild(opt);
      });
    });

    /* Remplir la liste des variétés (panneau 2) */
    const selM = document.getElementById('m-variete');
    varietes.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.id;
      opt.textContent = v.Nom + (v.Variete ? ' — ' + v.Variete : '');
      selM.appendChild(opt);
    });

    /* Construire les selects et pills avec les choix Grist */
    const TYPE    = metaChoix['Type']           || [];
    const EXPO    = metaChoix['Exposition']      || [];
    const ARROS   = metaChoix['Arrosage']        || [];
    const PROF    = metaChoix['Semis_profondeur']|| [];
    const FAMILLE = metaChoix['Famille']         || [];
    const NATURE  = metaChoix['Nature_du_sol']   || [];
    const QUALITE = metaChoix['Qualite_du_sol']  || [];
    const OU      = metaChoix['Ou_cultiver']     || [];
    const ORIG    = metaChoix['Origine']         || [];
    const SACHET  = metaChoix['Sachets']         || [];

    /* Panneau 1 — Variété */
    fillSelect('v-type', TYPE);
    fillSelect('v-profondeur', PROF);
    fillSelect('v-exposition', EXPO);
    fillSelect('v-arrosage', ARROS);
    fillMultiSelect('v-famille', FAMILLE);
    fillMultiSelect('v-nature-sol', NATURE);
    fillMultiSelect('v-qualite-sol', QUALITE);
    fillMultiSelect('v-ou-cultiver', OU);
    buildPills('v-abri', MOIS);
    buildPills('v-terre', MOIS);
    buildPills('v-recolte', MOIS);

    /* Panneau 2 — Millésime */
    fillMultiSelect('m-origine', ORIG);
    fillSelect('m-sachet', SACHET);

    /* Panneau 3 — Modèle */
    fillSelect('e-type', TYPE);
    fillSelect('e-profondeur', PROF);
    fillSelect('e-exposition', EXPO);
    fillSelect('e-arrosage', ARROS);
    fillMultiSelect('e-famille', FAMILLE);
    fillMultiSelect('e-nature-sol', NATURE);
    fillMultiSelect('e-qualite-sol', QUALITE);
    fillMultiSelect('e-ou-cultiver', OU);
    buildPills('e-abri', MOIS);
    buildPills('e-terre', MOIS);
    buildPills('e-recolte', MOIS);

  } catch(e) {
    console.error('Erreur init:', e);
  }
}

/* =============================================
   PANNEAU 1 — Charger un modèle
   ============================================= */
function chargerModele() {
  const id = parseInt(document.getElementById('v-modele').value);
  if (!id) return;
  const m = modeles.find(x => x.id === id);
  if (!m) return;
  appliquerModele(m, 'v');
}

function appliquerModele(m, prefix) {
  /* Texte */
  if (document.getElementById(prefix + '-conservation'))
    document.getElementById(prefix + '-conservation').value = m.Conservation || '';
  if (document.getElementById(prefix + '-duree-germ'))
    document.getElementById(prefix + '-duree-germ').value = m.Duree_germ || '';
  if (document.getElementById(prefix + '-temp-germ'))
    document.getElementById(prefix + '-temp-germ').value = m.Temp_germ || '';

  /* Selects */
  const sel = (id, val) => { if (document.getElementById(id)) document.getElementById(id).value = val || ''; };
  sel(prefix + '-type', m.Type);
  sel(prefix + '-profondeur', m.Semis_profondeur);
  sel(prefix + '-exposition', m.Exposition);
  sel(prefix + '-arrosage', m.Arrosage);

  /* Multi-selects */
  const toArray = v => Array.isArray(v) ? v : (v ? [v] : []);
  fillMultiSelect(prefix + '-famille',    metaChoix['Famille']        || [], toArray(m.Famille));
  fillMultiSelect(prefix + '-nature-sol', metaChoix['Nature_du_sol']  || [], toArray(m.Nature_du_sol));
  fillMultiSelect(prefix + '-qualite-sol',metaChoix['Qualite_du_sol'] || [], toArray(m.Qualite_du_sol));
  fillMultiSelect(prefix + '-ou-cultiver',metaChoix['Ou_cultiver']    || [], toArray(m.Ou_cultiver));

  /* Pills mois */
  setPills(prefix + '-abri',    toArray(m.Semis_sous_abris));
  setPills(prefix + '-terre',   toArray(m.Semis_pleine_terre));
  setPills(prefix + '-recolte', toArray(m.Recolte_floraison));
}

function resetVariete() {
  document.getElementById('v-modele').value = '';
  document.getElementById('v-nom').value = '';
  document.getElementById('v-variete').value = '';
  ['v-type','v-profondeur','v-exposition','v-arrosage'].forEach(id => document.getElementById(id).value = '');

  ['v-famille','v-nature-sol','v-qualite-sol','v-ou-cultiver'].forEach(id => {
    [...document.querySelectorAll(`#${id} option`)].forEach(o => o.selected = false);

  ['v-abri','v-terre','v-recolte'].forEach(id => setPills(id, []));
}

/* =============================================
   PANNEAU 2 — Créer un millésime
   ============================================= */
async function creerMillesime() {
  const varId   = parseInt(document.getElementById('m-variete').value);
  const annee   = parseInt(document.getElementById('m-millesime').value);
  if (!varId) { showMsg('msg-millesime', 'Choisir une variété.', 'err'); return; }
  if (!annee)  { showMsg('msg-millesime', 'Indiquer une année.', 'err'); return; }

  /* Grist stocke les dates en secondes depuis epoch — 1er janvier de l'année */
  const dateTs = Math.floor(new Date(annee + '-01-01T00:00:00Z').getTime() / 1000);

  const row = {
    NomVariete:   varId,
    Millesime:    dateTs,
    Nb_saisons:   document.getElementById('m-nb-saisons').value || null,
    Origine:      Origine: getMultiSelect('m-origine'),
    Sachets:      document.getElementById('m-sachet').value || null,
    Qtte_graines: parseFloat(document.getElementById('m-qtte').value) || null,
  };

  try {
    await grist.docApi.applyUserActions([
      ['AddRecord', 'Millesimes', null, row]
    ]);
    const v = varietes.find(x => x.id === varId);
    showMsg('msg-millesime', '✅ Millésime ' + annee + ' créé pour ' + (v ? v.Nom : ''), 'ok');
    resetMillesime();
  } catch(e) {
    showMsg('msg-millesime', '❌ Erreur : ' + e.message, 'err');
  }
}

/* =============================================
   PANNEAU 3 — Créer un modèle (espèce)
   ============================================= */
async function creerModele() {
  const nom = document.getElementById('e-nom').value.trim();
  if (!nom) { showMsg('msg-modele', 'Le nom est obligatoire.', 'err'); return; }

  const row = {
    Nom:                nom,
    Type:               document.getElementById('e-type').value || null,
    Conservation:       parseFloat(document.getElementById('e-conservation').value) || null,
    Semis_profondeur:   document.getElementById('e-profondeur').value || null,
    Duree_germ:         parseFloat(document.getElementById('e-duree-germ').value) || null,
    Temp_germ:          document.getElementById('e-temp-germ').value || null,
    Semis_sous_abris:   getPills('e-abri'),
    Semis_pleine_terre: getPills('e-terre'),
    Recolte_floraison:  getPills('e-recolte'),
    Exposition:         document.getElementById('e-exposition').value || null,
    Arrosage:           document.getElementById('e-arrosage').value || null,
    Nature_du_sol:      getMultiSelect('e-nature-sol'),
    Qualite_du_sol:     getMultiSelect('e-qualite-sol'),
    Famille:            getMultiSelect('e-famille'),
    Ou_cultiver:        getMultiSelect('e-ou-cultiver'),
  };

  try {
    await grist.docApi.applyUserActions([
      ['AddRecord', 'Modele', null, row]
    ]);
    showMsg('msg-modele', '✅ Espèce créée : ' + nom, 'ok');
    /* Ajouter à la liste des modèles */
    const dataModele = await grist.docApi.fetchTable('Modele');
    modeles = dataModele.id.map((id, i) => ({
      id, Nom: dataModele.Nom?.[i] || '',
      Type: dataModele.Type?.[i] || '',
      Conservation: dataModele.Conservation?.[i] || '',
      Semis_profondeur: dataModele.Semis_profondeur?.[i] || '',
      Duree_germ: dataModele.Duree_germ?.[i] || '',
      Temp_germ: dataModele.Temp_germ?.[i] || '',
      Semis_sous_abris: dataModele.Semis_sous_abris?.[i] || [],
      Semis_pleine_terre: dataModele.Semis_pleine_terre?.[i] || [],
      Recolte_floraison: dataModele.Recolte_floraison?.[i] || [],
      Exposition: dataModele.Exposition?.[i] || '',
      Arrosage: dataModele.Arrosage?.[i] || '',
      Nature_du_sol: dataModele.Nature_du_sol?.[i] || [],
      Qualite_du_sol: dataModele.Qualite_du_sol?.[i] || [],
      Famille: dataModele.Famille?.[i] || [],
      Ou_cultiver: dataModele.Ou_cultiver?.[i] || [],
    }));
    ['v-modele','e-modele-base'].forEach(id => {
      const sel = document.getElementById(id);
      sel.innerHTML = '<option value="">— Choisir un modèle —</option>';
      modeles.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id; opt.textContent = m.Nom;
        sel.appendChild(opt);
      });
    });
    resetModele();
  } catch(e) {
    showMsg('msg-modele', '❌ Erreur : ' + e.message, 'err');
  }
}
