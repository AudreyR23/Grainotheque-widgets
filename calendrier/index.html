<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, sans-serif;
  background: #f5f5f0;
  color: #222;
  padding: 12px;
}

h1 {
  font-size: 16px;
  color: #2d6a4f;
  margin-bottom: 12px;
  text-align: center;
}

/* Grille 12 mois — 4 colonnes × 3 lignes */
.calendrier {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

/* Carte d'un mois */
.mois-card {
  background: white;
  border-radius: 8px;
  border: 1px solid #d0e8d0;
  overflow: hidden;
}

.mois-titre {
  background: #2d6a4f;
  color: white;
  font-size: 11px;
  font-weight: bold;
  text-align: center;
  padding: 4px 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.mois-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  min-height: 60px;
}

.col-abri, .col-terre {
  padding: 4px 6px;
}

.col-abri {
  border-right: 1px solid #e0e8e0;
  background: #f0f8f0;
}

.col-label {
  font-size: 8px;
  font-weight: bold;
  color: #2d6a4f;
  margin-bottom: 3px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.variete-tag {
  display: block;
  font-size: 9px;
  color: #333;
  padding: 1px 0;
  border-bottom: 1px solid #e8f0e8;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.variete-tag:last-child { border-bottom: none; }

.vide {
  font-size: 9px;
  color: #aaa;
  font-style: italic;
}

/* Mois courant mis en évidence */
.mois-card.actuel .mois-titre {
  background: #e94560;
}
.mois-card.actuel {
  border-color: #e94560;
  box-shadow: 0 0 0 2px #e9456044;
}

.ligne-alerte {
    color:#333;
    cursor:pointer;
}

.ligne-alerte:hover {
    color:#e94560;
}  

/* Pop-in détails */
.popup {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  border:2px solid #2d6a4f;
  border-radius:10px;
  padding:12px;
  width:260px;
  max-height:300px;
  overflow:auto;
  box-shadow:0 5px 20px #0004;
  z-index:100;
  font-size:11px;
}

.popup h2 {
  font-size:13px;
  color:#2d6a4f;
  margin-bottom:8px;
}

.popup-close {
  float:right;
  cursor:pointer;
  color:#e94560;
  font-weight:bold;
}

.popup-ligne {
  margin-bottom:8px;
  border-bottom:1px solid #eee;
  padding-bottom:5px;
}  

.legende {
  text-align:center;
  font-size:9px;
  color:#777;
  margin-bottom:10px;
}
  
</style>
</head>
<body>

<h1>🌱 Calendrier des semis</h1>
<div class="legende">* Plusieurs variétés avec des périodes de semis différentes</div>
<div class="calendrier" id="calendrier"></div>
<div class="popup" id="popup"></div>

<script>

/* =============================================
   DEFINITION DES MOIS
============================================= */

const MOIS_DEF = [
  { num:1, label:'Janvier', abrevs:['Jan','Janvier'] },
  { num:2, label:'Février', abrevs:['Fév','Février'] },
  { num:3, label:'Mars', abrevs:['Mar','Mars'] },
  { num:4, label:'Avril', abrevs:['Avr','Avril'] },
  { num:5, label:'Mai', abrevs:['Mai'] },
  { num:6, label:'Juin', abrevs:['Jui','Juin'] },
  { num:7, label:'Juillet', abrevs:['Juil','Juillet'] },
  { num:8, label:'Août', abrevs:['Aou','Août'] },
  { num:9, label:'Septembre', abrevs:['Sep','Septembre'] },
  { num:10, label:'Octobre', abrevs:['Oct','Octobre'] },
  { num:11, label:'Novembre', abrevs:['Nov','Novembre'] },
  { num:12, label:'Décembre', abrevs:['Déc','Décembre'] }
];


const MOIS_COURANT = new Date().getMonth()+1;

function iconeType(type){

    if(!type) return '';

    const emojis = type.match(/[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu);

    return emojis ? emojis[emojis.length - 1] : '';

}  


/* =============================================
   TEST MOIS DANS CHOICELIST
============================================= */

function contientMois(valeur, mois){

  if(!valeur) return false;

  let liste = Array.isArray(valeur)
      ? valeur
      : String(valeur).split(',');


  return liste.some(v =>
      mois.abrevs.includes(v.trim())
  );

}


/* =============================================
   NOM PROPRE
============================================= */

function nomAffichage(n){

  if(!n) return '';

  return n.replace('\n',' ');

}

/* =============================================
   GRIST MULTI TABLE
============================================= */


grist.ready({
 requiredAccess:'read table'
});


let varietesParId = {};
let millesimesRecus = null;



function chargerVarietes(){


grist.docApi.fetchTable('Varietes')
.then(data=>{


    const ids = data.id || [];


    ids.forEach((id,i)=>{


varietesParId[id] = {

    Nom: data.Nom ? data.Nom[i] : '',

    Type: data.Type ? data.Type[i] : '',

    NomVariete: data.NomVariete ? data.NomVariete[i] : '',

    Semis_sous_abris:
        data.Semis_sous_abris
        ? data.Semis_sous_abris[i]
        : [],

    Semis_pleine_terre:
        data.Semis_pleine_terre
        ? data.Semis_pleine_terre[i]
        : []

};


    });



    if(millesimesRecus){
        renderCalendrier(millesimesRecus);
    }


})
.catch(err=>console.error(err));


}

function calendrierDifferent(varietes){

    const signatures = varietes.map(v =>
        JSON.stringify({
            abri: v.abri,
            terre: v.terre
        })
    );

    return new Set(signatures).size > 1;

}

function voirDetails(varietes, mois){

    if(typeof varietes === "string"){
        varietes = JSON.parse(varietes);
    }


    const popup = document.getElementById('popup');


        let html = `
    <span class="popup-close" onclick="fermerPopup()">✕</span>
    <h2>⚠ Différences — ${mois}</h2>
    `;


    const abreviation =
        MOIS_DEF.find(m => m.label === mois)
        ?.abrevs[0];


    let trouve = false;


    html += `<b>🌱 Variétés qui ne correspondent pas :</b><br><br>`;


    varietes.forEach(v=>{


        const okAbri =
            v.abri.includes(abreviation);


        const okTerre =
            v.terre.includes(abreviation);



        if(!okAbri && !okTerre){


            html += `
            <div class="popup-ligne">
            🌱 <b>${v.nom}</b><br>
            Pas de semis en ${mois}
            </div>
            `;


            trouve = true;

        }


    });



    if(!trouve){

        html += `
        <div class="popup-ligne">
        Toutes les variétés ont un semis en ${mois}.
        </div>
        `;

    }


    popup.innerHTML = html;
    popup.style.display="block";

}
function fermerPopup(){

    document.getElementById('popup')
    .style.display = "none";

}

function renderCalendrier(records){


const plantes={};



records
.filter(r=>r.Sachets)
.forEach(r=>{


    const v =
      varietesParId[r.NomVariete] ||
      Object.values(varietesParId)
      .find(x => x.NomVariete === r.NomVariete);


    if(!v) return;

    const nom = v.Nom;


 if(!plantes[nom]){

    plantes[nom]={
        nom: nom,
        type: v.Type || '',
        varietes: []
    };

}





    let abri = v.Semis_sous_abris || [];

    let terre = v.Semis_pleine_terre || [];



    // ChoiceList Grist : enlève le "L"
    if(Array.isArray(abri) && abri[0]==="L"){
    abri = abri.slice(1);
}

if(Array.isArray(terre) && terre[0]==="L"){
    terre = terre.slice(1);
}

plantes[nom].varietes.push({
    nom:v.NomVariete,
    abri: abri,
    terre: terre
});

});  

const liste = Object.values(plantes);



const cal=document.getElementById('calendrier');

cal.innerHTML='';



MOIS_DEF.forEach(mois=>{


let abri=[];
let terre=[];



liste.forEach(p=>{

let planteAffichee =
    iconeType(p.type)
    + " "
    + p.nom;


if(calendrierDifferent(p.varietes)){

    const idPopup = encodeURIComponent(
        JSON.stringify(p.varietes)
    );

   planteAffichee =
`<span class="ligne-alerte"
onclick="voirDetails(decodeURIComponent('${idPopup}'), '${mois.label}')">
${planteAffichee} *
</span>`;

}


    if(
        p.varietes.some(v =>
            v.abri.some(x=>mois.abrevs.includes(x))
        )
    ){

        if(!abri.includes(planteAffichee)){
            abri.push(planteAffichee);
        }

    }


    if(
        p.varietes.some(v =>
            v.terre.some(x=>mois.abrevs.includes(x))
        )
    ){

        if(!terre.includes(planteAffichee)){
            terre.push(planteAffichee);
        }

    }


});



const card=document.createElement('div');


card.className =
"mois-card" +
(mois.num===MOIS_COURANT ? " actuel":"");



card.innerHTML=`


<div class="mois-titre">
${mois.label}
</div>


<div class="mois-body">


<div class="col-abri">

<div class="col-label">
🏠 S/Abri
</div>


${
abri.length
?
abri.map(n=>`<span class="variete-tag">${n}</span>`).join('')
:
'<span class="vide">—</span>'
}


</div>



<div class="col-terre">

<div class="col-label">
🌿 P.Terre
</div>


${
terre.length
?
terre.map(n=>`<span class="variete-tag">${n}</span>`).join('')
:
'<span class="vide">—</span>'
}


</div>


</div>

`;


cal.appendChild(card);


});


}




grist.onRecords(function(records){

    millesimesRecus = records;


    if(Object.keys(varietesParId).length){
        renderCalendrier(records);
    }


});



chargerVarietes();



</script>
</body>
</html>
